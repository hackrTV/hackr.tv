# Ambient playlists for zones/rooms
# Tracks are specified by artist_slug (all tracks from that artist are included)
zone_playlists:
  - name: Fracture Network Ambience
    slug: fracture-network-ambience
    description: Atmospheric music for Fracture Network zones
    crossfade_duration_ms: 5000
    default_volume: 0.35
    artist_tracks: wavelength_zero

  - name: Transit Network Ambience
    slug: transit-network-ambience
    description: Instrumental ambience for neutral zones
    crossfade_duration_ms: 3000
    default_volume: 0.30
    artist_tracks: cipher_protocol

  - name: GovCorp Surveillance Ambience
    slug: govcorp-surveillance-ambience
    description: Unsettling atmospheric music for GovCorp zones
    crossfade_duration_ms: 6000
    default_volume: 0.25
    artist_tracks: temporal_blue_drift
