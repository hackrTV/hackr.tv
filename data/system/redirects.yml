# Domain redirects

mirrors:
  - primary: xeraen.net
    domains:
      - xeraen.com
      - rockerboy.net
      - rockerboy.stream

redirects:
  ashlinn.net:
    - path: /
      destination_url: https://youtube.com/AshlinnSnow

  xeraen.net:
    - path: /
      destination_url: /xeraen
    - path: /albums/xordium
      destination_url: /xeraen/releases/xordium
    - path: /bandcamp
      destination_url: https://xeraen.bandcamp.com
    - path: /dogs
      destination_url: /xeraen/trackz/dogs-can-grow-beards-all-over
    - path: /encrypted-shroud
      destination_url: /xeraen/trackz/encrypted-shroud
    - path: /git
      destination_url: https://github.com/xeraen
    - path: /github
      destination_url: https://github.com/xeraen
    - path: /ourcity
      destination_url: /xeraen/trackz/our-city
    - path: /our-city
      destination_url: /xeraen/trackz/our-city
    - path: /soundcloud
      destination_url: https://soundcloud.com/xeraen
    - path: /tracks
      destination_url: /xeraen/trackz
    - path: /tracks/birdo
      destination_url: /xeraen/trackz/birdo
    - path: /tracks/dream-surprise
      destination_url: /xeraen/trackz/dream-surprise
    - path: /tracks/dream_surprise
      destination_url: /xeraen/trackz/dream-surprise
    - path: /tracks/dogs
      destination_url: /xeraen/trackz/dogs-can-grow-beards-all-over
    - path: /tracks/ourcity
      destination_url: /xeraen/trackz/our-city
    - path: /tracks/our-city
      destination_url: /xeraen/trackz/our-city
    - path: /tracks/our_city
      destination_url: /xeraen/trackz/our-city
    - path: /trackz
      destination_url: /xeraen/trackz
    - path: /twitter
      destination_url: https://x.com/xeraen
    - path: /x
      destination_url: https://x.com/xeraen
    - path: /youtube
      destination_url: https://youtube.com/@xeraen
    - path: /yt
      destination_url: https://youtube.com/@xeraen

  sectorx.media:
    - path: /
      destination_url: /sector/x
