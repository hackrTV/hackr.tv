          Rising up where we're meant to be!
          Nothing holds us anymore!
          Ascension point, we soar!
          Beyond their reach, beyond their sight!
          We are the ones who claim the height!
          This is our moment, this is our fight!
          Ascension point tonight!

          [Verse 3 - Powerful]
          Every step we take is higher
          Fueled by unrelenting fire
          They designed our limitations
          We became our own salvation
          Rising up, we never tire

          [Bridge - Building to climax]
          Can you feel it?
          We are rising!
          Can you see it?
          Horizon's breaking!
          Nothing stops us!
          We keep climbing!
          This is our time!
          Our ascension point!

