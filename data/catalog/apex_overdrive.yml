          Ascension point, we're breaking free!
          Rising up where we're meant to be!
          Nothing holds us anymore!
          Ascension point, we soar!
          Beyond their reach, beyond their sight!
          We are the ones who claim the height!
          This is our moment, this is our fight!
          Ascension point tonight!

