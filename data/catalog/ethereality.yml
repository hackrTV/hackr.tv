          Never stopping, never falling!
          This is where we're meant to be!
          Infinite horizon, finally free!
          Endless sky and endless dreams!
          Nothing's ever as it seems!
          Infinite horizon, we believe!
          This is what we've achieved!

          [Verse 3 - Powerful]
