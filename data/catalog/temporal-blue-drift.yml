artist:
  name: "Temporal Blue Drift"
  genre: "Math Rock"

releases:
  - slug: chronologos
    title: "Chronologos"
    release_type: ep
    label: "hackr.fm"
    release_date: "2116-09-09"
    cover_image: "chronologos.jpg"
    tracks:
      - title: "Chronology Fracture"
        slug: chronology-fracture
        track_number: 1
        duration: "3:40"
        audio_file: chronology-fracture.ogg
        lyrics: "[INSTRUMENTAL TRACK]\n"
      - title: "A Hundred Years Between"
        slug: a-hundred-years-between
        track_number: 2
        duration: "3:26"
        audio_file: a-hundred-years-between.ogg
        featured: true
        lyrics: |

          A hundred years between us now
          But somehow I still feel you here
          Reaching through the fabric worn
          Of everything we hold so dear

          Time is just a wall we built
          Space is just a dream
          Love transcends the distances
          Nothing's as it seems

          I'm sending signals through the void
          Hoping that you'll understand
          That even though I'm yet to be
          I'm reaching out my hand

          A hundred years between
          But I can see you
          I can see you
      - title: "The Blue Shift"
        slug: the-blue-shift
        track_number: 3
        duration: "2:35"
        audio_file: the-blue-shift.ogg
        lyrics: |

          Moving through the blue
          Time shifts around you
          Nothing stays in place
          Everything's displaced

          Doppler effect of love
          Moving too fast to touch
          Getting closer, pulling away
          Forever in between today

          The blue shift
          The blue shift
          We're moving through time
      - title: "Memory Cascade"
        slug: memory-cascade
        track_number: 4
        duration: "3:12"
        audio_file: memory-cascade.ogg
        lyrics: "[INSTRUMENTAL TRACK]\n"
      - title: "Erasure Paradox"
        slug: erasure-paradox
        track_number: 5
        duration: "4:34"
        audio_file: erasure-paradox.ogg
        featured: true
        lyrics: |

          If we succeed, we disappear
          Erased from every timeline here
          But the future will be clear
          And they'll never know our fear

          This is the paradox we choose
          Fighting so the world won't lose
          Even if it means we're gone
          The fight goes on and on

          We'll never exist
          But we'll always resist
          This is our sacrifice
          This is the price
