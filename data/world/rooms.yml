# Grid Rooms
rooms:
  - name: hackr.tv Broadcast Station
    slug: hackr-tv-broadcast-station
    description: "The heart of the Fracture Network. Banks of jury-rigged broadcasting equipment line the walls, their displays flickering with temporal data streams. XERAEN's chair sits before the main console, headphones resting on vintage vinyl records. The air hums with electromagnetic interference - the sound of signals piercing through time itself."
    zone_slug: hackr-tv-central
    room_type: hub

  - name: Transit Corridor Alpha
    slug: transit-corridor-alpha
    description: "A dimly lit corridor with exposed cables running along the ceiling. Neon strips flicker intermittently, casting shadows on graffitied walls. The distant hum of machinery echoes through the space."
    zone_slug: transit-network
    room_type: transit

  - name: XERAEN Operations Center
    slug: xeraen-operations-center
    description: "Purple lighting bathes advanced temporal equipment. Monitors display cascading timelines and probability matrices. This is where the impossible mission originates - changing the past to prevent the future."
    zone_slug: sector-x
    room_type: faction_base

  - name: GovCorp Surveillance Node
    slug: govcorp-surveillance-node
    description: "Sterile white walls lined with surveillance feeds. Red warning lights pulse slowly. The oppressive atmosphere of total control permeates everything. You shouldn't be here. A RAINN patrol node blinks in the corner — its access port exposed."
    zone_slug: govcorp-surveillance
    room_type: govcorp

  - name: The Signal Bazaar
    slug: the-signal-bazaar
    description: "A cramped market corridor lit by flickering neon signs advertising firmware patches and bootleg components. Salvaged tech lines makeshift shelves behind reinforced glass. The air smells like solder and ozone. A vendor tracks your movements from behind a jury-rigged counter."
    zone_slug: transit-network
    room_type: shop

  - name: The Blacksite
    slug: the-blacksite
    description: "No signs. No light except a single red strip running along the baseboards. The air tastes like ozone and bad decisions. The walls are lined with signal-dampening mesh — nothing broadcasts in or out. If you found this place, you were meant to."
    zone_slug: the-underbelly
    room_type: shop
    min_clearance: 10

  - name: Residential Corridor
    slug: residential-corridor
    description: "A long corridor lined with numbered data-node access panels. Each panel conceals a private den belonging to a registered hackr. The air carries a faint hum of isolated processing cores. Somewhere behind the walls, a ventilation system cycles stale air."
    zone_slug: residential-district
    room_type: hub

  - name: The Rhythm Nexus
    slug: the-rhythm-nexus
    description: "Ryker's domain. A cavernous space converted into a combination recording studio, performance venue, and resistance headquarters. Drum kits and recording equipment share space with server racks. Vintage analog gear - tape machines, tube amplifiers, physical mixing boards - stands alongside digital systems. Purple and cyan neon cuts through the darkness. The air vibrates with potential energy even when no one's playing."
    zone_slug: hackr-hangar
    room_type: faction_base

  - name: "RestorePoint\u2122 Recovery Bay"
    slug: restorepoint-lakeshore-bay
    description: "You wake on a padded recovery slab under painfully neutral lighting. A holographic GovCorp logo rotates slowly overhead. A soothing voice intones: 'Welcome back to consciousness. Your RestorePoint\u2122 recovery fee has been automatically assessed. GovCorp cares.' The exit is to the south."
    zone_slug: restorepoint-lakeshore
    room_type: hospital
