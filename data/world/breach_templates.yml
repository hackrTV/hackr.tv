# BREACH Templates — encounter definitions for THE PULSE GRID.
# Loaded by: rails data:breach_templates (after item_definitions).
# Idempotent: find_or_initialize_by slug, skip if exists.
#
# protocol_composition: array of protocol definitions
#   type: trace | feedback | lock | adapt | spike | purge
#   count: number of instances to spawn
#   health/max_health: protocol durability
#   charge_rounds: rounds before activation (0 = active immediately)
#   weakness: software category vulnerable to (nullable = unknown until analyzed)

breach_templates:

  - slug: patrol-node-alpha
    name: "RAINN Patrol Node \u03B1"
    description: "A standard RAINN patrol node. Entry-level breach. Detection is slow but protocols are relentless once active."
