# Past Livestreams / VODs
# Import with: bin/rails import:yaml_vidz
#
# Fields:
#   - artist: Artist name (must match existing artist)
#   - title: Stream title
#   - live_url: Original livestream URL (auto-converts to embed)
#   - vod_url: YouTube/Twitch VOD URL (auto-converts to embed)
#   - started_at: When the stream started (ISO 8601 format)
#   - ended_at: When the stream ended (optional)

