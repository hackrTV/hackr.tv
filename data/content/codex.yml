      # Agent Kira Volkov

      - **Status:** Active
      - **Affiliation:** [[GovCorp]] (Counter-Resistance Division)
      - **Timeline:** Future
      - **Superior:** [[Director Elena Krell]]

      ## Background

      Orphaned during the civil unrest that preceded GovCorp's consolidation of power, Volkov was raised in state institutions. She credits GovCorp with saving her life and providing order where there was chaos. Her loyalty is not coerced — it is genuine.

      ## Methods

      Volkov specializes in long-term infiltration of resistance cells. Patient, methodical, and professionally detached. She has spent months embedded in communities sympathetic to [[The Fracture Network]], building trust before reporting back to [[Director Elena Krell|Krell]].

      ## The Doubt She Won't Name

      Field work exposes Volkov to things that don't fit her worldview. Moments of unfiltered reality that slip through [[The RIDE]]'s coverage. Music that makes her feel something [[PRISM]] can't categorize. She files these experiences as "operational anomalies" and does not dwell on them.

      She has not yet encountered the Fracture Network's music directly. When she does, her certainty may not survive the encounter.

