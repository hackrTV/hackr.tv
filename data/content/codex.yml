      # The Fracture Network

      - **Founded:** 2115
      - **Founder:** [[XERAEN]]
      - **Status:** Active across two timelines
      - **Primary Asset:** [[THE PULSE GRID]]

      ## Overview

      The Fracture Network is more than resistance - it's a temporal phenomenon. Operating through [[THE PULSE GRID]], the Network fights [[GovCorp]] not just in the future, but across time itself.

      ## The Trans-Temporal Mission

      The Network's primary mission is paradoxical: to prevent the future they exist in. Every broadcast sent from the future carries warnings, coordinates, and music that carries something the RIDE cannot counterfeit — reaching listeners before GovCorp's control becomes absolute.

      If they succeed, their timeline collapses. They fight knowing victory means their own erasure. This is not nihilism — it is the conviction that reality and goodness are real enough to sacrifice for.

      ## Cell Structure

      The Network operates through isolated cells, each independent and compartmentalized. No cell knows more than two adjacent cells. Communication flows through designated cutouts on [[The WIRE]]. This architecture — designed by [[Cipher]] — ensures that compromise of one cell cannot cascade to the network.

      ## The Faction Ecosystem

      The Fracture Network is organized into factions — coalitions of bands united by shared philosophy and method:

      - **[[Hackrcore]]** — Led by [[The.CyberPul.se]]. The core faction: broadcast truth, restore reality. Bands: TCP, [[Wavelength Zero]], [[Apex Overdrive]], [[Temporal Blue Drift]]
      - **[[Blackout]]** — Led by [[System Rot]] ([[Koda]]) with [[Calloway]] as philosophical authority. The violent edge: accelerate collapse. Bands: System Rot, [[Injection Vector]], [[BlitzBeam+]]
      - **[[Frontwave]]** — Led by [[Sora Nexa]] ([[Neon Hearts]]). Infiltration in plain sight: subvert from within. Bands: [[Ethereality]], Neon Hearts, [[heartbreak_havoc.sh]], [[Voiceprint]]
      - **[[Offline]]** — Independent ally. Complete disconnection, analog preservation. No faction membership.

      United by the conviction that reality and human dignity are worth preserving. Divided on methods, philosophy, and vision for what comes after. The tension between [[Hackrcore]] and [[Blackout]] — between restoration and destruction — is the central philosophical conflict within the Network.

      ## Present-Day Operations

      In the present, [[The Listeners]] — led by [[Mel Reeves]] — have progressed far beyond initial detection. Through [[The Relay Project]], they have decoded the Network's transmissions into viewable livestream and discovered the temporal loop that enables two-way interaction across a century.

      [[Nathan Clarke]]'s [[The Relay|Relay]] tool aggregates chat from multiple platforms, and its Uplink bridge mode implements the "reverse channel" — not through transmission, but through time itself. Messages sent today become century-old archives that XERAEN reads in the future.

