    content: |
      # The Slipstream

      - **Type:** Transit infrastructure
      - **Origin:** [[GovCorp]] (repurposed by [[The Fracture Network]])
      - **Purpose:** Physical rapid transit between [[THE PULSE GRID]] facilities

      ## Overview

      The Slipstream is [[GovCorp]]'s automated transportation network — high-speed underground rail and freight corridors that form the logistics backbone of managed reality. These corridors move materiel, equipment, and authorized personnel between population centers. They keep [[The RIDE|RIDE]] infrastructure supplied and maintained across thousands of miles. They span the continent.

      [[The Fracture Network]] discovered that GovCorp's transit system has a service layer — maintenance access, freight routing, emergency bypass — that runs parallel to passenger and cargo manifests. An operative in [[The Lakeshore]] can board at a service access point and emerge in [[The Riverlands]] without appearing in any transit log. GovCorp does not audit the service layer because the volume of automated freight traffic makes anomaly detection impractical at scale.

      ## Mechanics

      Operatives access the Slipstream through service hatches, maintenance platforms, and freight loading bays located near Grid facilities. The transit itself is physical — underground rail, automated freight cars, service vehicles running at speeds that cross the continent in hours. Fast, but not instant. An operative boards, rides, and arrives with their body in one piece at the other end.

      The transit is not invisible. Heavy use creates anomalies in service-layer traffic — unexpected mass readings on freight corridors, service access at unusual hours, wear patterns on maintenance infrastructure that don't match scheduled upkeep. The Network uses the Slipstream strategically, not casually.

      ## The Risk

      Every Slipstream transit is a calculated bet. The more frequently a corridor is used, the more likely its traffic patterns will deviate from the baseline that GovCorp's automated logistics systems expect. The Network rotates access points, staggers transit times, and limits the number of operatives using any single corridor within a given window.

      ## Offline's Alternative

      [[Offline]] maintains physical courier routes between regions — slower, on foot, completely invisible to GovCorp. When the Network cannot risk Slipstream traffic, Offline carries the message by hand. Their value to the resistance is directly proportional to the risk of mechanized transit.

