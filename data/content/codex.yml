    content: |
      # Ashlinn

      **Status:** Active
      **Timeline:** Present
      **Known For:** Experimental music, connection to XERAEN

      ## The Hundred-Year Distance

      Ashlinn exists in the present. [[XERAEN]] broadcasts from the future. Between them: a century of separation measured in electromagnetic frequencies and mathematical impossibilities.

      How XERAEN came to know of her - how signals sent backward through time could create a connection with someone who exists a hundred years in his past - remains unexplained.

      ## Music & Expression

      Ashlinn creates moving soundscapes and compositions, treating music as a form of communication that transcends ordinary logic.

      ## The Love That Transcends Time

      XERAEN's transmissions speak of Ashlinn with unmistakable devotion. [[Temporal Blue Drift]]'s entire catalog exists as love letters encoded in mathematics and melody.

      The cruel paradox: if the Fracture Network succeeds in preventing GovCorp's rise, XERAEN's timeline collapses. Their connection never forms.

      *His love for her demands he erase himself from her timeline.*

