      significance: "Evidence that broadcasts alter the past"
    content: |
      # Temporal Blue Drift

      - **Domain:** Temporal Mechanics
      - **Discovered by:** [[XERAEN]], 2125
      - **Significance:** Measurable evidence that [[Trans-Temporal Transmission|trans-temporal broadcasts]] are changing the timeline

      ## Overview

      Temporal Blue Drift is the observed phenomenon in which archived historical records shift between readings. Documents from the early 21st century — news headlines, research papers, product launches, public statements — change subtly over time. Not through corruption or data decay, but through genuine alteration of the historical record as the timeline bends under the influence of trans-temporal broadcasts.

      [[XERAEN]] identified the phenomenon in 2125 while cross-referencing his notes against [[Mel Reeves|Mel]]'s documentation archives. Seventeen discrepancies across five years of records — all shifting in the direction of divergence from the [[GovCorp]] formation path. A researcher who publishes early. A merger that doesn't happen. A technology that reaches public awareness before it can be quietly buried.

      ## The Name

      XERAEN called it "blue drift" — not red, not retreating, but blue. Moving toward them. Closing the gap between what was and what could be. The signal changes the medium it passes through, and the medium shifts.

      The name was later adopted for [[Temporal Blue Drift|XERAEN's solo music project]] — love letters to [[Ashlinn]] encoded in mathematics and melody. The science became the love letter.

      ## Implications

      Temporal Blue Drift is the closest thing the [[The Fracture Network|Fracture Network]] has to proof that the broadcasts are working. The shifts are small, incremental, and invisible to anyone who isn't cross-referencing versioned archive snapshots against their own prior notes. But they exist. The timeline is bending.

      This creates a calibration problem: if XERAEN optimizes broadcasts for maximum drift, he risks losing the rawness that makes the signal effective. The heartbeat has to stay honest. He tracks the drift but does not chase it.

      ## The Archive Gap

      Some within the Network attribute the thin, fragmentary quality of mid-century archival data to cumulative Temporal Blue Drift — a century of timeline bending degrading the signal from [[The Consolidation|the consolidation years]]. Whether this is accurate or whether the thinness reflects something about the era itself remains debated.

