    content: |
      # The WIRE

      **Full Name:** Wideband Information Relay Emitter
      **Operator:** [[The Fracture Network]]
      **Status:** Active
      **Access:** [[THE PULSE GRID]]

      ## Overview

      The WIRE is [[The Fracture Network]]'s primary communication platform - a decentralized broadcast network that allows hackrs to transmit short-form messages called "pulses" across the resistance.

      ## Terminology

      - **Pulse:** A single broadcast message (max 256 characters)
      - **Echo:** Rebroadcasting another hackr's pulse
      - **Splice:** A reply that threads into an existing pulse conversation
      - **Signal Drop:** When a pulse is removed by moderation

