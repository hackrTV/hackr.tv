  - name: Nathan Clarke
    slug: nathan-clarke
    entry_type: person
    summary: "Software engineer and codec developer who decoded the Fracture Network's trans-temporal transmissions into viewable livestream — builder of The Relay, the tool that bridges a century."
    position: null
