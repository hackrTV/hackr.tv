    content: |
      # PRISM

      - **Full Name:** Physical Reality Interface and Synthesis Matrix
      - **Operator:** [[GovCorp]]
      - **Architect:** [[Dr. Marcus Chen]]
      - **Status:** Active (incorporated into [[The RIDE]])

      ## Overview

      PRISM is the foundational technology that enabled [[GovCorp]]'s rise to power. It manipulates the quantum substrate underpinning human perception — the malleable boundary between objective reality and subjective experience that [[Dr. Marcus Chen]] first identified in 2048.

      ## Mechanism

      PRISM does not alter physical matter. It alters how physical matter is perceived. Environmental infrastructure — atmospheric nanomesh, architectural integration elements, ambient field generators — manipulates quantum states at the perceptual boundary, filtering what reaches conscious experience.

      ## Capabilities

      - **Perception filtering:** Removing or modifying sensory input before it reaches conscious awareness
      - **Emotional dampening:** Regulating emotional responses to maintain behavioral compliance
      - **Memory softening:** Reducing the psychological impact of experiences that might generate resistance
      - **Dream monitoring:** Analyzing subconscious states for early indicators of perceptual independence

      ## Limitations

