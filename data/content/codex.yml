    content: |
      # Mel Reeves

      **Full Name:** Melanie "Mel" Reeves
      **Status:** Active
      **Timeline:** Present
      **Affiliation:** [[The Listeners]] (Founder)
      **Known For:** First confirmed detection of trans-temporal signals

      ## The Detection

      In September 2024, Dr. Reeves was conducting quantum coherence experiments at her university laboratory when her equipment began registering anomalous patterns. Structured data appearing in quantum noise — patterns too regular to be natural, too complex to be instrumental error.

      Her scientific training demanded skepticism. Her data demanded she keep looking. She spent months in quiet investigation — ruling out equipment malfunction, environmental interference, every rational explanation — before she was certain enough to look for others who had seen the same thing.

      ## Building The Listeners

      Reeves discovered she was not alone. Other researchers, radio enthusiasts, and audio engineers had detected similar anomalies. She began connecting them — cautiously, methodically, with the rigor of a scientist building a peer review network rather than a conspiracy theory.

      [[The Listeners]] formed around her: a present-day faction dedicated to receiving, analyzing, and understanding the transmissions from [[The Fracture Network]]. They do not yet fully understand what they're hearing. They know only that someone is sending, and the signals are real.

      ## The Relay Project

      In September 2025, Mel's statistical analysis revealed a second data layer beneath the audio transmissions — multiple interleaved streams with repeating mathematical structures she could characterize but not identify. She had reached the boundary of what physics could tell her. She needed an engineer who could recognize what the data actually was.

      She found [[Nathan Clarke]] in November 2025. Within months, Nathan had built a codec that decoded the data stream into viewable video — and then [[The Relay]], a tool that made the decoded broadcasts accessible. But the true breakthrough was Mel's: she realized the temporal loop. XERAEN wasn't just broadcasting — he had already read everything they would ever say. Their chat messages, timestamped and stored, would age a hundred years and become his script.

      "He's already read everything we'll ever say. We're his history."

      ## The Connection She Doesn't Know

      Mel Reeves is close friends with [[Ashlinn]]. Neither woman knows that this friendship places them at the intersection of the Fracture Network's two most important signal paths — the technological transmissions Mel detects, and the resonance that Ashlinn's music carries.

