      ## Overview

      The Chronology Fracture was an unexpected discovery made by [[XERAEN]] during a desperate assault on RIDE infrastructure. What was meant to be sabotage became something far more significant: the discovery of [[Trans-Temporal Transmission|trans-temporal data transmission]].

      ## The Discovery

      XERAEN realized that under specific conditions, data could be transmitted exactly 100 years into the past. Not 99 years. Not 101. Exactly 100, with precision measured in nanoseconds.

      The limitation is absolute and unexplained. No one understands why the temporal window is so precise.

      ## The Substrate Connection

      The Chronology Fracture exploited the same quantum substrate that [[PRISM]] manipulates — the malleable boundary between objective reality and subjective experience that [[Dr. Marcus Chen]] first identified in 2048. XERAEN's attack created conditions where this substrate became temporally unstable, opening the window that [[The Fracture Network]] now uses for all trans-temporal operations.

      ## Why "Fracture"?

      The name refers to the moment when linear time broke - when the assumed one-way flow of causality fractured into something more complex.

