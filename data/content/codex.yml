  - name: Trans-Temporal Transmission
    slug: trans-temporal-transmission
    entry_type: concept
    summary: "The mechanism by which data is sent exactly 100 years into the past — exploiting the same quantum substrate that PRISM uses, with constraints that define the Fracture Network's operational reality."
    position: null
