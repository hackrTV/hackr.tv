    content: |
      # The Badlands

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone (minimal coverage)

      ## Overview

      High plains stretching to horizons broken only by eroded rock formations and river-cut canyons. Enormous sky. Sparse population — the lowest density of any named region. The land was called the Badlands long before [[GovCorp]] existed, and the name outlasted every attempt to rebrand it. Some geography is too honest to rename.

      [[The RIDE|RIDE]] coverage in The Badlands is thin by design. GovCorp allocates rendering resources by population density, and there is almost no one here to render for. The Cultural Zone programming is minimal — rugged independence, silence, space. Residents of The Badlands are largely left alone, which is what they came for.

      The [[The Fracture Network|Fracture Network]] maintains emergency caches and dead-drop routes through The Badlands. The thin RIDE coverage makes it useful for transit and storage, but the sparse infrastructure and extreme distances make it impractical for permanent operations. [[Offline]] has the strongest presence here — their philosophy of disconnection finds its natural geography.

      The Badlands also house [[The Analog Archive]] — [[Offline]]'s preservation facility, the only Grid zone with zero digital infrastructure. Every Fracture Network recording preserved on tape, vinyl, and physical media that requires physical destruction to erase.

