      # GovCorp

      **Established:** ~2100
      **Status:** Ruling entity
      **Control:** Global

      ## Overview

      GovCorp is the totalitarian fusion of government and corporate power that controls most aspects of life. What began as a race for [[PRISM]] technology evolved into complete merger of state and commercial interests.

      ## Systems of Control

      ### The RIDE
      GovCorp's first and largest endeavor was expanding [[PRISM]] into [[The RIDE]] - a worldwide system for manipulating reality.

      ### Economic Surveillance
      Complete tracking and monitoring of all economic activity through controlled cryptocurrencies.

      ### RAINNs
      Randomized AI Neural Networks serve as GovCorp's agents throughout the RIDE and beyond.

      ## The Temporal Blind Spot

      GovCorp's models assume temporal permanence. The discovery that PRISM can be affected by signals sent backward through time represents an existential threat they have not fully comprehended.

      ## Related Entries

