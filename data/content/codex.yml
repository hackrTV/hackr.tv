    content: |
      # The Bend

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      Where a great continental river makes its final sharp curve before meeting the sea. Built below sea level, perpetually at war with water. The land itself resists occupation — floods, subsidence, heat, humidity. People built here anyway, for centuries, because the river was worth it.

      Like [[The Riverlands]], The Bend has deep musical roots that predate [[The Consolidation]] by centuries. GovCorp's Cultural Zone programming exploits this ruthlessly — curating an identity built on celebration, excess, and performative joy. The RIDE renders The Bend as perpetual festival. Residents feel like they live in the most alive place on the continent. The vitality is real in origin but manufactured in delivery.

      The [[The Fracture Network|Fracture Network]] watches The Bend carefully. The region's authentic musical substrate — like The Riverlands — shows stronger [[The Resonance Field|Resonance Field]] readings than baseline. But the RIDE coverage here is dense and the Cultural Zone programming is aggressive. The Bend is a place where genuine signal and manufactured signal are nearly impossible to distinguish.

      Below the surface, in flood control tunnels and utility corridors beneath the water table, [[System Rot]] operates [[The Undercity]] — the Fracture Network's most physically hostile facility, and its most uncompromising.

