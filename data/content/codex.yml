      # Hackrcore

      **Type:** Musical philosophy
      **Status:** Active across all [[The Fracture Network|Fracture Network]] factions

      ## Not a Sound

      Hackrcore is not a genre. It is a philosophy: music-as-resistance. Any sound created with authentic intent that carries truth against manufactured reality is Hackrcore.

      This encompasses the full spectrum — [[System Rot]]'s hardcore punk, [[Neon Hearts]]' J-Pop, [[Cipher Protocol]]'s progressive metal, [[Ethereality]]'s vocal trance, [[Voiceprint]]'s melodic DnB. The genre is irrelevant. The authenticity is everything.

      ## Why It Works

      Hackrcore exists because beauty disrupts [[The RIDE]]. [[PRISM]]'s materialist architecture was designed to manage perception within materialist categories — measurable, quantifiable, controllable. But authentic creative expression generates [[The Resonance Field|something that exceeds those categories]].

      The RIDE can process manufactured music. It cannot fully process genuine beauty. This is not a frequency hack — it is an encounter with something that the system's philosophical foundation cannot account for.

      ## The Spectrum

      Different frequencies reach different audiences. [[System Rot]]'s raw aggression awakens those who respond to rage. [[Neon Hearts]]' accessible pop reaches those who would never engage with overt resistance. [[Wavelength Zero]]'s atmospheric depth restores emotional range. Each faction's music is a different wavelength of the same truth.

