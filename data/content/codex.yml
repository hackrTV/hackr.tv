    content: |
      # Dr. Marcus Chen

      - **Status:** Active
      - **Affiliation:** [[GovCorp]] (PRISM Division)
      - **Timeline:** Future
      - **Known For:** Discovering the core principle behind [[PRISM]] technology

      ## The Discovery

      In 2048, Marcus Chen was a quantum physicist studying the substrate underlying perceived reality. His research revealed that perception itself operates on manipulable quantum states — that the boundary between "objective reality" and "subjective experience" is thinner and more malleable than anyone had theorized.

      He published. He shouldn't have published.

      ## The Architecture of Control

      What began as pure research became [[PRISM]] — the Physical Reality Interface and Synthesis Matrix. Chen designed the foundational architecture: the mechanisms by which environmental infrastructure could manipulate the quantum substrate underpinning human perception.

      He told himself it was science. He told himself applications were someone else's responsibility. By the time [[GovCorp]] expanded PRISM into [[The RIDE]], Chen understood that his curiosity had built a cage for the entire human race.

      ## Growing Horror

      Chen remains within GovCorp because leaving would mean losing access to the systems he built — and with it, any chance of understanding their full capabilities and limitations. He knows things about PRISM's architecture that no one else does, including vulnerabilities he has not yet disclosed.

      Whether he will act on this knowledge — defect, sabotage, or simply continue documenting in silence — remains an open question. His guilt grows. His access remains.

      ## Related Entries

