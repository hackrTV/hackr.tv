      [[Sora Nexa]] spends real energy managing heartbreak_havoc.sh. She is volatile, one foot in [[Blackout]]'s world, and her underground performances create a trail that could expose Frontwave's entire operation. She and [[BlitzBeam+]] get along personally — both high-energy, both aggressive — even though their factions clash.

