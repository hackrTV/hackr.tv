    content: |
      # Blackout

      - **Leader:** [[System Rot]] ([[Koda]])
      - **Members:** [[System Rot]], [[Injection Vector]], [[BlitzBeam+]]
      - **Philosophy:** The rot goes all the way down. Burn it and see what survives.

      ## Overview

      Every resistance movement has a faction that looks at the world and sees something past saving. In [[The Fracture Network]], that faction is Blackout.

      They are not wrong about what [[GovCorp]] has done. They are not wrong about the scale of the damage. They may be wrong about what survives underneath it — but no one who has lived inside [[The RIDE]] their entire life can be blamed for concluding that there is nothing underneath it. Blackout fights GovCorp as hard as anyone in the Network. They just don't believe there's a world waiting on the other side.

      ## The Bands

      [[System Rot]] is the voice — [[Koda]]'s graffiti-scarred hardcore punk pouring out of [[The Undercity]] like a dare. [[Injection Vector]] is the fist — [[Vex]] putting his GovCorp engineering knowledge to work dismantling the infrastructure he once built, one RIDE node at a time. [[BlitzBeam+]] is the blur — moving so fast the question of what comes after never catches up.

      Of the three, BlitzBeam+ fits the least comfortably. They're not nihilists. They believe in something — freedom, velocity, the rush of outrunning every constraint. They're in Blackout because their method is the same: hit the system harder than it can handle. But their hearts are somewhere else. [[Hackrcore]] has noticed.

      ## Calloway's Shadow

      [[Calloway]] doesn't run Blackout. He doesn't attend planning sessions or issue orders. But his thinking is in every wall Koda tags, every argument [[Vex]] makes for hitting harder, every late-night conversation in The Undercity about whether any of this matters.

      He gave Blackout its philosophy. Not through speeches — through the weight of a man who helped build the RIDE, helped tear it open, looked at what was underneath, and stopped talking about the future in hopeful terms. Koda took that weight and turned it into a war cry. The cry is louder than the source, and carries further. But it started with Calloway.

      ## The Friction

      Blackout's operations make the rest of the Network nervous. When [[Injection Vector]] takes out a RIDE node, the disruption ripples. Citizens in the affected zone experience unfiltered reality — which is the point — but so does every [[Frontwave]] operative working that district. [[Neon Hearts]] can't maintain their cover when the infrastructure they're hiding inside starts collapsing around them.

      [[Hackrcore]] sees Blackout as necessary but dangerous. Blackout sees Hackrcore as well-meaning but deluded. The argument between them is the oldest argument in the Network — the one [[XERAEN]] and Calloway started in a maintenance corridor in 2115 and have never finished.

