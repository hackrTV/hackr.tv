    content: |
      # The Marshes

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      A broad peninsula jutting into warm ocean, most of it barely above sea level. Wetlands, mangrove, sawgrass, and subtropical heat. The boundary between land and water is so gradual and so constantly shifting that even [[The RIDE]] has difficulty maintaining consistent perceptual rendering at the margins. Tidal zones, seasonal flooding, and biological density create a landscape that resists the kind of static modeling the RIDE depends on.

      GovCorp's Cultural Zone programming emphasizes leisure, warmth, and retirement — a managed paradise of coast and sunshine. The interior wetlands are largely depopulated, left to flood and reclaim at will. GovCorp sees no value in rendering swamp for an audience that isn't there.

      The [[The Fracture Network|Fracture Network]] has noted The Marshes' interior as a potential operational space — vast, unmonitored, difficult to render — but the environment itself is hostile to the kind of infrastructure the Network requires. The water wins every argument.

