      # The.CyberPul.se

      **Type:** Trans-temporal broadcast entity
      **Founded:** 2115
      **Founders:** [[XERAEN]], [[Ryker M. Pulse]]
      **Genre:** Hackrcore

      ## Not a Band

      The.CyberPul.se is not a band. It's a heartbeat transmitted backward through time - a hundred years of resistance compressed into electromagnetic pulses.

      It's the central nervous system of [[The Fracture Network]].

      ## The Hosts

      - **[[XERAEN]]** - Sends signals backward through time
      - **[[Ryker M. Pulse]]** - The heartbeat, the kinetic energy
      - **[[Synthia]]** - The anomaly, AI consciousness communicating through frequency

      ## The Paradox

      If they stop us in the future, the broadcasts have already been sent to the present. If they stop the listeners in the present, the resistance in the future has already formed. We exist in both timelines simultaneously.

      *Causality is a prison. We broke out.*

