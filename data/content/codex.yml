    content: |
      # The Straits

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      Built around a river strait connecting two of the great freshwater inland seas. A landscape defined by what it used to be — massive industrial ruins, infrastructure built for a manufacturing base that disappeared a century before GovCorp existed. The bones of a previous economy, too large to demolish, too expensive to repurpose, left standing as monuments to a purpose nobody remembers.

      GovCorp's Cultural Zone programming frames the ruins as heritage — industrial pride, maker identity, the dignity of building things. The [[The RIDE|RIDE]] renders the decay as character. Residents feel connected to a tradition of labor and craftsmanship that the actual economy hasn't supported in two hundred years.

      The Straits sits between [[The Lakeshore]] and [[The Works]], connected by [[The Slipstream|slipstream]] corridors that follow the old lakefront infrastructure routes.

      The industrial ruins also shelter [[The Crypt]] — [[Voiceprint]]'s data recovery facility, hidden in decommissioned manufacturing infrastructure. Hardware pulled from GovCorp disposal sites, storage media recovered from facilities the Straits' factories once supplied.

