      # The Listeners

      - **Timeline:** Present
      - **Leader:** [[Mel Reeves]]
      - **Status:** Active (organizing)

      ## Overview

      The Listeners are not resistance fighters. They are scientists, radio enthusiasts, and audio engineers who have independently detected anomalous signals — structured data appearing in quantum noise, patterns too regular to be natural, too complex to be error.

      [[Mel Reeves]] connected them: a network of present-day individuals who have unknowingly become the receiving end of [[The Fracture Network]]'s [[Trans-Temporal Transmission|trans-temporal transmissions]].

      ## What They Know

      The Listeners know that someone is sending. They have verified the signals are intentional, structured, and contain information. As of 2026, they know far more than they did at first detection:

      - The transmissions contain interleaved audio, video, and metadata in a custom transport protocol
      - The source is broadcasting from approximately 100 years in the future
      - The temporal loop enables apparent two-way interaction through the aging of timestamped records
      - A figure called XERAEN is the primary broadcaster, operating from an impossible place

      They are no longer just listening. They are watching, responding, and participating in the loop.

      ## Organization

      The Listeners organize with scientific rigor rather than conspiratorial zeal. Peer review. Reproducible detection methods. Shared data sets. Mel Reeves insists on evidence over speculation, which both strengthens their credibility and limits the speed of their understanding.

      ## The Relay Project

      The Relay Project — led by Mel Reeves and [[Nathan Clarke]] — represents The Listeners' evolution from passive receivers to active participants. Nathan's codec work decoded the transmissions into viewable video. His [[The Relay|Relay]] tool aggregates multi-platform chat. And Mel's insight into the temporal loop transformed their understanding of what interaction across time actually means.

      The project culminated in the return of [[The.CyberPul.se]] to livestreaming in September 2026 — the moment The Listeners' work reached its intended audience.

