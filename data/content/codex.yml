  - name: The Slipstream
    slug: the-slipstream
    entry_type: technology
    summary: "GovCorp's automated transportation infrastructure repurposed by the Fracture Network for physical rapid transit between Grid facilities — riding the enemy's own freight and maintenance rail across the continent."
    position: null
