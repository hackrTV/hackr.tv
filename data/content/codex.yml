      # The Flats

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      Vast coastal prairie stretching flat to the horizon along a warm gulf. No elevation change, no forest cover, no terrain to break line of sight. The most geographically exposed region on the continent. [[The RIDE|RIDE]] coverage is total and unobstructed — the flat terrain and open sky make this the easiest region for GovCorp to render and the hardest for the [[The Fracture Network|Fracture Network]] to operate in.

      The Cultural Zone programming runs on scale, heat, and swagger — big everything, loud identity, fierce regional pride. GovCorp gives The Flats a personality that demands space, which conveniently discourages the kind of density that creates RIDE rendering challenges.

      The Fracture Network maintains only transit routes through The Flats. No fixed assets. Nowhere to hide.

