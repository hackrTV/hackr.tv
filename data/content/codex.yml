  - name: The Arch
    slug: the-arch
    entry_type: location
    summary: "A massive steel monument at the confluence of two great rivers — and the Fracture Network's only known persistent RIDE deadzone, created by amplifying the structure's natural interference with RIDE signal propagation."
    position: null
