  - name: Koda
    slug: koda
    entry_type: person
    summary: "System Rot's street artist and voice — grew up inside the RIDE without knowing it, awakened at 19, and channeled his rage into reality-glitch graffiti that makes the invisible visible. Leads Blackout's day-to-day operations under Calloway's philosophical influence."
    position: null
    published: true
    metadata:
      timeline: "future"
      faction: Blackout
