      ## The RIDE Vulnerability

      She helped build the RIDE's emotional regulation protocols. She knows exactly where they break down: love. GovCorp's systems can suppress anger, redirect fear, dampen grief. But authentic romantic attachment exceeds what their algorithms can parse. Love is not a data type — it is something the RIDE was never built to contain.

      ## Two Modes

      heartbreak_havoc.sh operates in two distinct modes, and this duality is a known problem within [[Frontwave]]:

      **In monitored spaces** — love songs that weaponize authentic emotion as RIDE exploit. Tracks like "heartbreak_havoc.sh" and "fatal_attraction.exe" pass through content filters because the RIDE categorizes them as entertainment. The real weapon is the genuine feeling they provoke.

      **At underground events** — overtly anti-GovCorp anthems. "RIDE.corrupt" and "./exeCUTE" are performed at Fracture Network shows where subtlety is unnecessary. Every time she drops one of these at an underground show, she risks drawing GovCorp attention back to her "innocent" output.

      ## Frontwave's Liability

      [[Sora Nexa]] spends real energy managing heartbreak_havoc.sh. She is volatile, one foot in [[Blackout]]'s world, and her underground performances create a trail that could expose Frontwave's entire operation. She and [[BlitzBeam+]] get along personally — both high-energy, both aggressive — even though their factions clash.

