      # Koda

      **Status:** Active
      **Affiliation:** [[System Rot]]
      **Timeline:** Future
      **Known For:** Reality-glitch graffiti, awakening narrative

      ## Born Inside the Cage

      Koda is part of the generation that never knew unfiltered reality. Born after [[The RIDE]]'s global deployment, he spent 19 years living in manufactured perception without knowing it. His reality was curated from birth — every sight, every sound, every emotional response shaped by [[PRISM]]'s invisible architecture.

      ## The Awakening

      At 19, a [[The RIDE|RIDE]] malfunction gave Koda 47 seconds of unfiltered reality. Less than a minute. Enough to shatter everything he thought he knew.

      The world without the RIDE was louder, uglier, more chaotic — and more beautiful than anything he'd experienced. Colors he'd never seen. Sounds he'd never heard. The raw, unprocessed weight of existence hitting him without the buffer of managed perception.

      He couldn't go back. The RIDE resumed, but he could feel it now — the filter between himself and the real. The knowledge that every experience was being processed, softened, controlled.

      ## The Art

      Koda paints reality glitches. His graffiti appears on walls throughout GovCorp-controlled sectors — images that capture the moment of awakening, the visual stutter when the RIDE fails and unfiltered reality bleeds through. The art itself carries no resistance data, no encoded messages. It simply shows what the world looks like without the filter.

      This is enough to make it dangerous.

      ## Anger and Discipline

      Koda's rage is genuine and justified. The tension within [[System Rot]] — and within Koda himself — is between that rage and the discipline needed to channel it productively. Destruction feels righteous but accomplishes little. Art that makes people see accomplishes everything.

