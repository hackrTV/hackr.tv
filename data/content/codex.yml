      - **Philosophy:** Authentic expression carrying truth against manufactured reality
      - **Method:** Broadcast, restore, build

      ## Overview

      Hackrcore is the backbone of [[The Fracture Network]] — the faction closest to its founding mission. Led by [[The.CyberPul.se]], these bands share the conviction that reality is real, beauty is indestructible, and the [[The RIDE|RIDE]] is a counterfeit that can be torn away to reveal what was always underneath.

      The name comes from the genre [[The.CyberPul.se]] created, but the faction transcends any single genre. Atmospheric metal, euphoric hardstyle, math rock — what unites Hackrcore is not sound but philosophy: music-as-resistance. Any sound created with authentic intent that carries truth against manufactured reality belongs here.

      ## The Bands

      **[[The.CyberPul.se]]** — The heartbeat. Trans-temporal broadcast entity. The central nervous system of the entire Fracture Network, not just this faction. [[XERAEN]] provides vision and temporal operations, [[Ryker M. Pulse|Ryker]] provides the kinetic force, [[Synthia]] provides the voice.

      **[[Wavelength Zero]]** — The probe. Patient, methodical exploration of [[The RIDE|RIDE]] weaknesses through sustained frequency work. Where TCP broadcasts outward, Wavelength Zero searches inward — mapping the RIDE's architecture through emotional resonance and finding the cracks.

      **[[Apex Overdrive]]** — The rally. Defiant joy — euphoria as resistance in a world designed to suppress it. Unity anthems, call-and-response, the sonic embodiment of triumph. When the Fracture Network gathers, Apex Overdrive is the sound of people choosing to feel alive together.

      **[[Temporal Blue Drift]]** — The personal. [[XERAEN]]'s solo project — love letters to [[Ashlinn]] encoded in mathematics and melody. The most intimate expression in the faction, and the purest distillation of what Hackrcore fights for: connection that is real.

      ## Why It Works

      Hackrcore exists because beauty disrupts [[The RIDE]]. [[PRISM]]'s materialist architecture was designed to manage perception within materialist categories. But authentic creative expression generates something that exceeds those categories. The RIDE can process manufactured music. It cannot fully process genuine beauty. This is not a frequency hack — it is an encounter with something the system's philosophical foundation cannot account for.

      ## Relationship to Other Factions

      Hackrcore is the faction that believes there is something worth restoring. This puts them in direct philosophical tension with [[Blackout]], who believe the corruption has replaced reality entirely. The argument between [[XERAEN]] and [[Calloway]] is the argument at the heart of the Fracture Network: is there anything left to save?

      Hackrcore respects [[Frontwave]]'s methods — reaching people inside [[GovCorp]]'s world — even if some members question the compromises involved.

