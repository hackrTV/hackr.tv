  - name: THE PULSE GRID
    slug: the-pulse-grid
    entry_type: location
    summary: "The Fracture Network's operational infrastructure — a network of physical facilities across the continent, connected by the Slipstream and spanning two centuries through the signal. Hackrs in the 2020s participate in the Grid's operations from a century away, their authentic choices carried across the temporal gap by something no one built."
    position: null
