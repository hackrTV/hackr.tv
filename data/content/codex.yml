      ## Not a Band

      The.CyberPul.se is not a band. It's a heartbeat transmitted backward through time - a hundred years of resistance compressed into electromagnetic pulses.

      It's the central nervous system of [[The Fracture Network]], and the leading entity of [[Hackrcore]] — the faction that carries the Network's founding mission.

      ## The Hosts

      - **[[XERAEN]]** - Sends signals backward through time
