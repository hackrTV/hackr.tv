    content: |
      # Nyx

      - **Status:** Active
      - **Affiliation:** [[The Fracture Network]]
      - **Timeline:** Future
      - **Known For:** Recent awakening, fresh perspective on the resistance

      ## The Extended Glitch

      Most [[The RIDE|RIDE]] glitches last seconds. Nyx experienced hours.

      An extended malfunction in her sector left her exposed to unfiltered reality for long enough to not just glimpse it but live in it. She saw the world without [[PRISM]]'s perceptual management — raw, overwhelming, terrifying, and real in a way that nothing in her managed existence had ever been.

      When the RIDE resumed, she couldn't unsee what she'd seen. The reintegration was traumatic — knowing that every perception was being filtered, every emotion regulated, every experience curated by systems she'd never consented to.

      ## Finding the Network

      Nyx found [[The Fracture Network]] through [[The WIRE]] — or rather, the Network found her. Her behavioral patterns after the glitch deviated enough from her normalized profile that Fracture operatives identified her as newly awakened and made contact.

      ## The Surrogate

      Nyx asks the questions that veterans have stopped asking. Why do we fight if winning means erasure? How do we know the unfiltered world is better? What if [[GovCorp]] is right that managed reality reduces suffering?

      The answers she receives shape her understanding — and through her, the understanding of anyone encountering the resistance for the first time.

