    content: |
      # The Works

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      River valleys cutting through rolling hills, dense with the skeletal remains of a vanished industrial age. Steelworks, foundries, mills — structures too massive to demolish, too contaminated to repurpose, left standing as the landscape's dominant feature. The rivers that powered the original industry still run through everything, brown and slow.

      GovCorp's Cultural Zone programming builds identity around craft, labor, and working-class solidarity. [[The RIDE]] renders the ruins as heritage rather than decay. Residents feel a deep connection to the tradition of making things — the pride of the forge, the dignity of the mill. The irony is that nothing has been manufactured in The Works for generations. The identity is as manufactured as anything else the RIDE produces.

      The Works sits between [[The Straits]] to the north and [[The Lakeshore]] to the west, connected by [[The Slipstream|slipstream]] corridors running through old industrial transport routes.

      The old foundry infrastructure now houses [[The Forge]] — [[Cipher Protocol]]'s encryption workshop, where resistance hardware is built and stress-tested. Real manufacturing in a region where the RIDE curates manufacturing identity as nostalgia.

