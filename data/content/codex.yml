      ## The Builder

      Vex spent seven years as a systems engineer in [[GovCorp]]'s RIDE Operations division. He built the infrastructure he now attacks — the environmental integration systems, the atmospheric nanomesh calibration protocols, the architectural elements that deliver [[PRISM]]'s reality manipulation to every inhabited space.

      He was good at his job. He believed in it. He thought he was building something that helped people.

      ## The Defection

      What changed wasn't dramatic revelation but accumulated evidence. Maintenance logs showing RIDE "corrections" applied to citizens who exhibited independent thought. Behavioral modification schedules targeting artists. Reconditioning orders for people whose only crime was seeing the world clearly.

      Vex didn't wake up one morning opposed to GovCorp. He eroded, like a structure undermined by the truth he kept encountering in the data.

      [[Cipher]] mentored him through the defection — teaching him operational security, helping him disappear from GovCorp's surveillance infrastructure, channeling his engineering knowledge toward resistance operations.

      ## Injection Vector

      Vex leads [[Injection Vector]], a faction specializing in physical infiltration of [[The RIDE|RIDE]] infrastructure. His intimate knowledge of the systems he built makes him uniquely capable of identifying vulnerabilities and access points.

      The faction's deathcore soundtrack matches their operational philosophy: direct, brutal, kinetic. Where other factions work through digital channels or cultural subversion, Injection Vector operates in physical space — sabotage, hardware manipulation, infrastructure disruption.

      ## The Guilt

      Vex carries the weight of every year he spent building the cage. Every RIDE node he calibrated. Every "correction" his infrastructure enabled. The guilt does not paralyze him — it fuels him. But it is always present.

