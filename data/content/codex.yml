      Timeline Collapse is the inevitable consequence of [[The Fracture Network]]'s success. If they prevent [[GovCorp]]'s rise to power, then the timeline from which they broadcast ceases to exist.

      [[XERAEN]]'s timeline collapses. He ceases to exist. The broadcasts stop.

      *Victory means erasure.*

      ## The Weight of Knowledge

      Every member of the Fracture Network operates with full knowledge of what success means. They fight anyway. This is not nihilism — their sacrifice is meaningful precisely because reality is real and goodness is worth preserving. They trade their existence for the authentic existence of billions who will never know they were saved.

