    content: |
      # Ryker M. Pulse

      - **Status:** Active
      - **Affiliation:** [[The.CyberPul.se]] (Co-founder), [[The Fracture Network]]
      - **Location:** [[The Hackr Hangar]]
      - **Known For:** Drums, percussion, broadcasting, defiance

      ## Before the Fracture

      Before the resistance, Ryker was a software engineer. He was competent, reliable, employed — and miserable. The work was never the problem. Code was honest enough. But the apparatus around it — the managers optimizing throughput, the metrics reducing craft to velocity, the endless meetings where people performed productivity instead of doing anything — drained something out of him he couldn't name at the time. It was never a career to him. It was a slow, managed diminishment of everything he actually was.

      Music was what kept him alive. He'd been playing drums since he was a teenager, and in his early twenties he met [[XERAEN]] through the underground music scene — two people who heard the same thing in the noise and wanted to build something from it. They spent three years working on projects together. Nothing ever took off. Wrong timing, no resources, life getting in the way. But the creative bond was real, and the friendship it built ran deeper than any project they failed to finish.

      When XERAEN was recruited by [[GovCorp]] in 2109, the music dried up. They stayed in touch, but XERAEN's new life consumed him. Ryker kept engineering, kept hating it, kept making music alone in whatever hours he could steal from a career that felt less like work and more like a rehearsal for the RIDE.

      ## The Loss

      Someone close to Ryker — someone he loved — was subjected to RIDE reconditioning after exhibiting signs of perceptual independence. They came back... different. Smoothed. The rough edges that made them human filed down by [[GovCorp]]'s behavioral correction systems.

      Ryker never says their name in the logs. The grief is private. The rage is not.

      ## The Heartbeat

      If [[XERAEN]] carries the signal, Ryker is the heartbeat. When XERAEN showed up at his door three weeks after the [[Chronology Fracture]], looking like he hadn't slept in a month, Ryker said yes before he finished talking. Not because he understood the physics. Because he understood what [[The RIDE]] was doing — the same thing his career had been doing to him for nine years, scaled to the entire species. Optimizing the humanity out of everything and calling it improvement.

      He drums anyway. Louder. Faster. Each beat a declaration that existence matters even when existence is temporary. The music he and XERAEN never got off the ground in their twenties became the most important broadcast in human history. The timing was never wrong. They just weren't ready yet.

      ## Connection to XERAEN

      The friendship predates XERAEN's years at GovCorp, predates the RIDE, predates the resistance. They built trust over a decade of failed music projects and honest conversations — the kind of trust you get when someone has seen you fail at the thing you love and stayed anyway. When XERAEN needed someone to build the physical infrastructure for trans-temporal broadcasting, Ryker was the only choice.

      [[The Hackr Hangar]] is his creation — a broadcast facility in [[The Riverlands]], outside GovCorp's monitoring grid, where unfiltered sound can be captured and transmitted. While XERAEN handles the temporal mechanics from [[Sector X]], Ryker ensures there's something worth transmitting. They operate apart by necessity — co-location creates convergence patterns in [[The RIDE]]'s model that trigger GovCorp's threat detection — but their work is inseparable.

      *Some people whisper revolution. Ryker beats it into existence.*

      ## Related Entries

