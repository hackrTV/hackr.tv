    content: |
      # The Canopy

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      Dense evergreen forests stretching from coast to volcanic peaks. Persistent rain, low cloud cover, a green ceiling that filters everything. The tree canopy is so thick in places that the sky disappears entirely. Volcanic peaks break through at intervals — massive, snow-capped, ancient.

      The terrain and biological density create natural [[The RIDE|RIDE]] attenuation. Not deadzones — the RIDE functions — but the rendering is softer here, less precise. GovCorp attributes it to the organic interference of dense biomass. They have spent significant resources trying to resolve the issue. The forests keep growing.

      The Cultural Zone programming emphasizes sustainability, connection to nature, and quiet independence. Residents of The Canopy feel like they live in the last honest place. They do not. But the RIDE has to work harder here, and the edges show if you know where to look.

      The natural acoustic isolation and RIDE attenuation make The Canopy home to [[Frequency Gardens]] — [[Cascade]]'s acoustic facility, designed using her synesthetic perception to produce environments that suspend the RIDE's perceptual management through sound.

