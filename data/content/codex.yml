  - name: Ryker M. Pulse
    slug: ryker-m-pulse
    entry_type: person
    summary: "Co-founder of The.CyberPul.se, primary drummer, and the kinetic force behind the Fracture Network's broadcasts — a man who chose to beat resistance into existence."
    position: null
