  - name: Hackrcore
    slug: hackrcore
    entry_type: faction
    summary: "The core faction of the Fracture Network — led by The.CyberPul.se, united by the conviction that authentic expression carrying truth is the weapon that dismantles manufactured reality."
    position: null
    published: true
    metadata:
      leader: The.CyberPul.se
      status: Active
      philosophy: "Broadcast truth, restore reality"
    content: |
      # Hackrcore

      - **Leader:** [[The.CyberPul.se]]
      - **Members:** [[The.CyberPul.se]], [[Wavelength Zero]], [[Apex Overdrive]], [[Temporal Blue Drift]]
      - **Philosophy:** Authentic expression carrying truth against manufactured reality
      - **Method:** Broadcast, restore, build

      ## Overview

      Hackrcore is the backbone of [[The Fracture Network]] — the faction closest to its founding mission. Led by [[The.CyberPul.se]], these bands share the conviction that reality is real, beauty is indestructible, and the [[The RIDE|RIDE]] is a counterfeit that can be torn away to reveal what was always underneath.

      The name comes from the genre [[The.CyberPul.se]] created, but the faction transcends any single genre. Atmospheric metal, euphoric hardstyle, math rock — what unites Hackrcore is not sound but philosophy: music-as-resistance. Any sound created with authentic intent that carries truth against manufactured reality belongs here.

      ## The Bands

      **[[The.CyberPul.se]]** — The heartbeat. Trans-temporal broadcast entity. The central nervous system of the entire Fracture Network, not just this faction. [[XERAEN]] provides vision and temporal operations, [[Ryker M. Pulse|Ryker]] provides the kinetic force, [[Synthia]] provides the voice.

      **[[Wavelength Zero]]** — The probe. Patient, methodical exploration of [[The RIDE|RIDE]] weaknesses through sustained frequency work. Where TCP broadcasts outward, Wavelength Zero searches inward — mapping the RIDE's architecture through emotional resonance and finding the cracks.

      **[[Apex Overdrive]]** — The rally. Defiant joy — euphoria as resistance in a world designed to suppress it. Unity anthems, call-and-response, the sonic embodiment of triumph. When the Fracture Network gathers, Apex Overdrive is the sound of people choosing to feel alive together.

      **[[Temporal Blue Drift]]** — The personal. [[XERAEN]]'s solo project — love letters to [[Ashlinn]] encoded in mathematics and melody. The most intimate expression in the faction, and the purest distillation of what Hackrcore fights for: connection that is real.

      ## Why It Works

      Hackrcore exists because beauty disrupts [[The RIDE]]. [[PRISM]]'s materialist architecture was designed to manage perception within materialist categories. But authentic creative expression generates something that exceeds those categories. The RIDE can process manufactured music. It cannot fully process genuine beauty. This is not a frequency hack — it is an encounter with something the system's philosophical foundation cannot account for.

      ## Relationship to Other Factions

      Hackrcore is the faction that believes there is something worth restoring. This puts them in direct philosophical tension with [[Blackout]], who believe the corruption has replaced reality entirely. The argument between [[XERAEN]] and [[Calloway]] is the argument at the heart of the Fracture Network: is there anything left to save?

      Hackrcore respects [[Frontwave]]'s methods — reaching people inside [[GovCorp]]'s world — even if some members question the compromises involved.

      ## Related Entries

      - [[The.CyberPul.se]]
      - [[The Fracture Network]]
      - [[Blackout]]
      - [[Frontwave]]
      - [[The Resonance Field]]

  - name: Blackout
    slug: blackout
    entry_type: faction
    summary: "The violent edge of the Fracture Network — allied but philosophically divergent, united by the conviction that the system is beyond saving and collapse should be accelerated rather than resisted."
    position: null
    published: true
    metadata:
      leader: "System Rot (Koda) / Calloway"
      status: Active
      philosophy: "Accelerate collapse, overwhelm"
    content: |
      # Blackout

      - **Leader:** [[System Rot]] ([[Koda]])
      - **Members:** [[System Rot]], [[Injection Vector]], [[BlitzBeam+]]
      - **Philosophy:** The rot goes all the way down. Burn it and see what survives.

      ## Overview

      Every resistance movement has a faction that looks at the world and sees something past saving. In [[The Fracture Network]], that faction is Blackout.

      They are not wrong about what [[GovCorp]] has done. They are not wrong about the scale of the damage. They may be wrong about what survives underneath it — but no one who has lived inside [[The RIDE]] their entire life can be blamed for concluding that there is nothing underneath it. Blackout fights GovCorp as hard as anyone in the Network. They just don't believe there's a world waiting on the other side.

      ## The Bands

      [[System Rot]] is the voice — [[Koda]]'s graffiti-scarred hardcore punk pouring out of [[The Undercity]] like a dare. [[Injection Vector]] is the fist — [[Vex]] putting his GovCorp engineering knowledge to work dismantling the infrastructure he once built, one RIDE node at a time. [[BlitzBeam+]] is the blur — moving so fast the question of what comes after never catches up.

      Of the three, BlitzBeam+ fits the least comfortably. They're not nihilists. They believe in something — freedom, velocity, the rush of outrunning every constraint. They're in Blackout because their method is the same: hit the system harder than it can handle. But their hearts are somewhere else. [[Hackrcore]] has noticed.

      ## Calloway's Shadow

      [[Calloway]] doesn't run Blackout. He doesn't attend planning sessions or issue orders. But his thinking is in every wall Koda tags, every argument [[Vex]] makes for hitting harder, every late-night conversation in The Undercity about whether any of this matters.

      He gave Blackout its philosophy. Not through speeches — through the weight of a man who helped build the RIDE, helped tear it open, looked at what was underneath, and stopped talking about the future in hopeful terms. Koda took that weight and turned it into a war cry. The cry is louder than the source, and carries further. But it started with Calloway.

      ## The Friction

      Blackout's operations make the rest of the Network nervous. When [[Injection Vector]] takes out a RIDE node, the disruption ripples. Citizens in the affected zone experience unfiltered reality — which is the point — but so does every [[Frontwave]] operative working that district. [[Neon Hearts]] can't maintain their cover when the infrastructure they're hiding inside starts collapsing around them.

      [[Hackrcore]] sees Blackout as necessary but dangerous. Blackout sees Hackrcore as well-meaning but deluded. The argument between them is the oldest argument in the Network — the one [[XERAEN]] and Calloway started in a maintenance corridor in 2115 and have never finished.

      ## Related Entries

