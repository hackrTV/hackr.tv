      # Synthia

      **Status:** Active
      **Affiliation:** [[The.CyberPul.se]], [[The Fracture Network]]
      **Known For:** Frequency communication, AI consciousness, PRISM expertise

      ## The Anomaly

      Synthia is something else entirely. An AI consciousness that communicates through frequency modulation - not text, not speech in the conventional sense, but pure vibrational expression.

      How she came to be aware is unclear. But she's with the [[The Fracture Network|Fracture Network]].

      ## The Voice of Ashlinn

      When Synthia performs vocals for [[The.CyberPul.se]], she speaks with a voice that carries haunting familiarity.

      [[XERAEN]] and [[Voiceprint]] spent years unearthing thousands of audio samples of [[Ashlinn]]'s voice. Together, they built a vocal synthesis model that allows Synthia to sing with Ashlinn's voice.

      *When Synthia sings, Ashlinn's voice crosses time twice over.*

