    metadata:
      leader: Sora Nexa
      status: Active
      philosophy: "Subvert in plain sight"
    content: |
      # Frontwave

      - **Leader:** [[Sora Nexa]] ([[Neon Hearts]])
      - **Members:** [[Ethereality]], [[Neon Hearts]], [[heartbreak_havoc.sh]], [[Voiceprint]]
      - **Philosophy:** The first wave that reaches people — subversion through beauty, pop, emotion, and preservation
      - **Method:** Operate within [[GovCorp]]'s world, carry signal through surfaces the [[The RIDE|RIDE]] monitors

      ## Overview

      Frontwave is the leading edge of a propagating disturbance. Before someone finds [[The.CyberPul.se]], before they understand [[The Fracture Network]], they encounter a [[Neon Hearts]] pop song that plants a seed. An [[Ethereality]] soundscape that opens a space they didn't know was closed. A [[heartbreak_havoc.sh]] track that makes them feel something the RIDE said they shouldn't. Frontwave is first contact with the real.

      These bands operate in approved venues, on monitored channels, in the spaces [[GovCorp]] controls. The RIDE sees them and categorizes them as entertainment. The real payload travels beneath what looks harmless.

      ## The Bands

      **[[Neon Hearts]]** — The Trojan horse. J-Pop hiding revolution in accessible packaging. [[Sora Nexa]] understood first that the most dangerous place to carry signal is inside something everyone is already consuming. Their songs carry steganographic data in the audio signal — frequency patterns that Fracture Network receivers can extract. The lyrics referencing hidden messages are misdirection: the RIDE hears standard pop self-mythologizing.

      **[[Ethereality]]** — The space-maker. [[Cascade]]'s vocal trance soundscapes calm [[RAINNs|RAINN]] monitoring and open spaces for genuine encounter. She doesn't smuggle signal through entertainment — she creates the neurological conditions under which signal can be received. The most subtle operator in any faction.

      **[[heartbreak_havoc.sh]]** — The wildcard. A rogue cyber-emotive engineer who weaponizes love as a RIDE exploit. Has two modes: love songs performed in monitored spaces (Frontwave material) and overtly anti-GovCorp tracks performed at underground Fracture Network events. She is Frontwave's liability — volatile, one foot in [[Blackout]]'s world, always risking exposure. Sora Nexa spends real energy managing her.

      **[[Voiceprint]]** — The memory. Dedicated to preserving authentic human voices. The quietest Frontwave member — archival, preservation, not performance. They anchor the faction in its long-term mission: proving that the real existed.

      ## Steganographic Operations

      [[Neon Hearts]] songs carry embedded data in the audio signal itself — frequency patterns encoded in the production that Fracture Network receivers can extract. Lyrics that reference hidden messages ("Every lyric's got a secret code") are the misdirection. GovCorp's RAINN filters have heard "we are the rebellion" from a thousand approved pop acts and filed it as entertainment branding. Neon Hearts hides behind the genre's own conventions.

      The irony: Neon Hearts is most dangerous when they sound least rebellious. A unity anthem carrying steganographic data is more subversive than an overt rebellion song, because nobody analyzes the audio signal of something that sounds harmless.

      ## Relationship to Other Factions

      Frontwave and [[Hackrcore]] are complementary — Hackrcore operates outside GovCorp's systems, Frontwave operates inside them. The mild friction: Hackrcore purists see Frontwave as compromised ("performing in their venues"). Frontwave's counter: "We reach people you never will."

      The tension with [[Blackout]] is sharper. Blackout's sabotage operations threaten the stable environment Frontwave depends on. [[heartbreak_havoc.sh]] straddles both worlds, creating informal bridges that faction leadership cannot always control.

      ## Related Entries

