      # Sora Nexa

      **Status:** Active
      **Affiliation:** [[Neon Hearts]] (Leader/Producer)
      **Timeline:** Future
      **Known For:** Pop production, mass psychology expertise, the Trojan horse strategy

      ## The Pop Star

      Before the resistance, Sora Nexa was one of GovCorp's most successful entertainers. Her music was engineered for maximum reach — catchy, accessible, emotionally resonant in exactly the ways [[PRISM]]'s algorithms rewarded. She was the system working as designed.

      Then she learned what "working as designed" actually meant. Her music wasn't just entertainment — it was a [[The RIDE|RIDE]] delivery mechanism, carrying perceptual management frequencies beneath the hooks and harmonies. Every listener she reached was a listener she helped control.

      ## The Turn

      Sora didn't defect dramatically. She adjusted. Subtle changes to her productions — frequencies that created momentary RIDE interference, lyrics that carried double meanings, arrangements that briefly opened windows in managed perception. Small enough to avoid detection. Significant enough to matter.

      When GovCorp's monitoring eventually flagged the anomalies, she was already connected to [[The Fracture Network]].

      ## The Philosophical Tension

      Sora uses the tools of manipulation for liberation — crafting music designed to bypass defenses, to reach audiences who would reject overt resistance messaging. She is effective precisely because she understands how to shape perception.

      This creates genuine philosophical tension. She uses persuasion techniques developed for control in service of freedom. The means resemble what she opposes. She is aware of this tension and does not resolve it cleanly.

