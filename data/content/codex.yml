      # The Gate

      - **Type:** Regional location
      - **Status:** [[GovCorp]] Cultural Zone

      ## Overview

      Built around a narrow strait where an inland bay opens to the ocean. Fog, hills, a peninsula dense with infrastructure. The Gate has a deep history as a center of technical innovation — the region that built the tools that built the tools that built [[PRISM]]. The irony is not lost on those who know the history. Most do not.

      GovCorp operates major research facilities here. [[The RIDE|RIDE]] infrastructure development, perceptual rendering optimization, Cultural Zone programming design — much of the technology that maintains managed reality is refined in The Gate. The Cultural Zone identity emphasizes innovation and progressive thinking. The residents believe they are shaping the future. In a narrow, managed sense, they are.

