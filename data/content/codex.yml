      **At underground events** — overtly anti-GovCorp anthems. "RIDE.corrupt" and "./exeCUTE" are performed at Fracture Network shows where subtlety is unnecessary. Every time she drops one of these at an underground show, she risks drawing GovCorp attention back to her "innocent" output.

