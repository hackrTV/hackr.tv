    summary: "Step-by-step walkthroughs. Follow them in order to learn a full subsystem end-to-end."
    articles:
      - slug: tutorial-mine-your-first-cred
        title: Mine Your First CRED
        kind: tutorial
        difficulty: beginner
        position: 0
        published: true
        summary: "Provision a mining rig, install components, and earn your first CRED."
        metadata:
          search_tags:
            - cred
            - mining
            - tutorial
            - rigs
        body: |
          # Mine Your First CRED

          CRED is the currency of THE PULSE GRID. You earn it by running a
          mining rig. This tutorial gets you from zero to mining.

          ## 1. Check your provisioning

          Log in and run `rig`. If you see a rig, you're already provisioned.
          If not, check `help` for the provisioning command.

          ## 2. Inspect your rig

          `rig inspect` shows your motherboard slots and what's installed.

          ## 3. Turn the rig on

          `rig on` — your rig starts working and will accrue CRED over time.

          ## 4. Check your cache

          `cache` lists your wallets. The default one receives mining rewards.

          ## 5. Boost while streaming

          Watching `#live` during an active stream boosts your mining rate
          and earns a chat bonus on top. Showing up pays off.

          ## Next step

          Read [Clearance Levels](/handbook/clearance-levels) to understand
          how progression works.

      - slug: tutorial-first-breach
        title: Your First BREACH
        kind: tutorial
        difficulty: beginner
        position: 1
        published: true
        summary: "Step-by-step walkthrough: equip a DECK, load software, find an encounter, and survive your first BREACH."
        metadata:
          search_tags:
            - breach
            - tutorial
            - combat
            - deck
            - beginner
        body: |
          # Your First BREACH

          BREACH encounters are protocol combat — the Grid's main
          challenge. This walkthrough takes you from unarmed to
          your first successful breach.

          ## 1. Get a DECK

          You need a DECK equipped to breach. If you completed the
          Bootloader tutorial, you already have one. Otherwise, buy
          one from a vendor or receive one from a mission reward.

          Check with `deck` — if you see battery and slot info, you're
          equipped. If not, find a DECK in your inventory and `equip` it.

          ## 2. Load software

          A DECK without loaded software can't do anything in a breach.
          Check your inventory for software items and load them:

          ```
          deck load Ping Spike
          deck load ICE Breaker
          ```

          Each program uses DECK slots (check with `deck`). Load as
          many as your slots allow. Offensive software that matches a
          protocol's weakness deals 1.5× damage — variety helps.

          ## 3. Find an encounter

          Explore until `look` shows a breach encounter in the room.
          You'll see something like:

          ```
          [ BREACH TARGETS ]
          Signal Relay Node [STANDARD]
          ```

          ## 4. Initiate

          ```
          breach Signal Relay Node
          ```

          You're now in a BREACH. The terminal shows the protocol grid —
          each protocol has a type, HP, and position number.

          ## 5. Gather intel

          Before attacking blindly, analyze a protocol:

          ```
          analyze 1
          ```

          This reveals the protocol's weakness. Match your software to
          it for bonus damage. You might get a free bonus action from
          the analyze.

          ## 6. Attack

          Execute software against a protocol:

          ```
          exec Ping Spike 1
          ```

          This deals damage based on the software's strength and
          whether it matches the protocol's weakness. Each exec costs
          one action and battery.

          ## 7. End of round

          After you use all your actions, the round ends. Surviving
          protocols fire their effects (TRACE adds detection, FEEDBACK
          drains vitals, SPIKE drains HP, etc.). Watch the detection
          clock — if it hits 100, you fail.

          ## 8. Repeat or retreat

          Keep analyzing and executing. Your action count ramps up over
          rounds as inspiration builds. If things go badly, type
          `jackout` to abort (costs some vitals but avoids failure
          consequences).

          ## 9. Victory

          Destroy all protocols to win. You'll receive XP and CRED.

          ## Tips

          - Prioritize **SPIKE** protocols — they drain your HP directly
            and can kill you.
          - Prioritize **TRACE** protocols — they accelerate the
            detection clock.
          - Use `reroute` to delay a dangerous protocol for one round
            (30% chance to fizzle, though).
          - Keep an eye on your battery — running dry means you can't
            execute software.
          - If your DECK gets fried on a failed breach, visit a repair
            service room or use a DECK Repair Kit.

          ## Next steps

          Read the full [BREACH Encounters](/handbook/breach-encounters)
          reference for protocol types, puzzle gates, failure tiers,
          and the action economy rank table.

      - slug: tutorial-first-transit
        title: Your First Transit Ride
        kind: tutorial
