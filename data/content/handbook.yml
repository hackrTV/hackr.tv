  - slug: terminal
    name: Terminal Interfaces
    icon: "%"
    position: 5
    published: true
    summary: "Command syntax reference for the in-Grid terminal."
    articles:
      - slug: grid-terminal-basics
        title: GRID Terminal Basics
        kind: reference
        position: 0
        published: true
        summary: "Common commands: look, go, take, examine, help, social commands, and aliases."
        metadata:
          search_tags:
            - commands
            - terminal
            - help
            - say
            - who
            - aliases
        body: |
          # GRID Terminal Basics

          Inside THE PULSE GRID, you interact by typing commands. The terminal
          parses the first word as the command and the rest as arguments.

          ## Core commands

          | Command | Aliases | Purpose |
          |---------|---------|---------|
          | `look` | `l` | Describe the current room — exits, items, mobs, other hackrs. |
          | `go <dir>` | `n`, `s`, `e`, `w`, `ne`, `se`, `sw`, `nw`, `up`, `down` | Move through an exit. Cardinal, intercardinal, and vertical shortcuts work. |
          | `examine <target>` | `ex`, `x` | Inspect a mob, item, hackr, or fixture. |
          | `take [qty\|all] <item>` | `get` | Pick up an item. |
          | `drop [qty\|all] <item>` | — | Drop an item. |
          | `inventory` | `inv`, `i` | Show your carried items and capacity. |
          | `stat` | `st`, `stats` | Show XP, clearance, vitals, CRED, loadout, and achievements. |
          | `help` | `?` | List all available commands. |
          | `clear` | `cls`, `cl` | Clear the terminal screen. |

          ## Social commands

          | Command | Purpose |
          |---------|---------|
          | `say <message>` | Broadcast a message to everyone in your current room. |
          | `who` | List all online hackrs and the rooms they're in. |
          | `examine <hackr>` | Inspect another operative — shows their visible loadout (head, eyes, chest, legs, feet). |

          ## Partial name matching

          You don't have to type full names. The terminal resolves partial
          matches automatically — type enough to be unique. If your input
          matches multiple targets, you'll see a disambiguation prompt.
          See [Inventory & Items](/handbook/inventory-items) for details.

          ## Not using the web client?

          If you prefer a native terminal, see
          [SSH Terminal Access](/handbook/ssh-terminal-access) — same command
          parser, different front door.
      - slug: ssh-terminal-access
        title: SSH Terminal Access
        kind: reference
        position: 1
        published: true
        summary: "Connect to hackr.tv from a native terminal over SSH. Rotating credentials at /terminal."
        metadata:
          search_tags:
            - ssh
            - terminal
            - access
            - credentials
            - mudlet
        body: |
          # SSH Terminal Access

          hackr.tv can be accessed from a native terminal over SSH, separate
          from the web client. Some operatives prefer it — native keybinds,
          tmux/screen sessions, scrollback, and no browser chrome.

          ## Get the Network credentials

          Visit [`/terminal`](/terminal) to see the current connection
          command and password. Credentials rotate daily, so check back when
          your session expires.

          ## Connect

          From any terminal:

          ```
          ssh access@terminal.hackr.tv -p 9915
          ```

          Enter the password from the `/terminal` page when prompted.

          ## Compatible clients

          Anything that speaks SSH will work. Common choices:

          - **Linux / BSD** — your shell of choice (bash, zsh, fish, ksh, sh) in any emulator
          - **macOS** — Terminal.app, Kitty, Ghostty, iTerm2
          - **Windows** — Windows Terminal, Tabby, mRemoteNG, PuTTY
          - **Mobile** — Termux (Android), a-Shell or Blink (iOS)
          - **MUD-aware** — Mudlet, TinTin++, MUSHclient

          MUD clients give you the nicest experience for the in-Grid
          interface — triggers, aliases, logging, and highlighted output.

          ## Inside the session

          Once connected, you will have general hackr access. To connect to THE
          PULSE GRID, you'll need to log in with your operative credentials. At
          that point, you can access THE PULSE GRID where you will be at the
          same command parser described in
          [GRID Terminal Basics](/handbook/grid-terminal-basics). All the same
          commands work.

          ## Why rotating credentials?

          The daily rotation is a soft barrier, not a secret. The purpose is
          to keep the endpoint public-ish (anyone who visits the web can
          connect) without giving bots a permanent handle.

  - slug: tactical-interface
    name: TACTICAL INTERFACE
    icon: "+"
    position: 6
    published: true
    summary: "The multi-pane desktop tactical view — isometric map, status panels, and visual controls."
    articles:
      - slug: tactical-overview
        title: Tactical UI Overview
        kind: reference
        position: 0
        published: true
        summary: "What the Tactical interface is, how to access it, layout, and differences from standard view."
        metadata:
          search_tags:
            - tactical
            - ui
            - interface
            - overview
            - desktop
        body: |
          # Tactical UI Overview

          The Tactical interface is an alternative way to play THE PULSE GRID.
          Instead of a single text terminal, you get a multi-pane desktop
          layout with a visual map, status panels, and a command terminal
          side by side.

          ## Access

          Navigate to `/grid/1337` or click **TACTICAL VIEW** in the PULSE
          GRID menu. The Tactical interface requires the `tactical_grid`
          feature grant — if you don't see the link, you haven't been
          granted access yet.

          The Tactical interface is **desktop-only**. It uses a fixed
          CSS Grid layout that requires a wide viewport.

          ## Layout

          The screen is divided into three main areas:

          - **Top bar** — your alias, clearance level (with hover tooltip),
            vitals bars (HP/EN/PS), connection status, and a link back to
            standard view.
          - **Left column** — split between the tabbed **Status Panel**
            (upper) and the **Terminal** (lower). The terminal works exactly
            like the standard view — type commands, see output.
          - **Right column** — the **Zone Map**, an isometric visual
            representation of your current zone.

          ## Keyboard

          Press **Tab** to focus the command input from anywhere.

          ## Real-time features

          The Tactical interface connects via WebSocket for real-time
          updates:

          - **GridChannel** — room events (movement, say, take, drop).
          - **ZoneChannel** — zone-wide presence updates (see other
            operatives move on the map in real time).

          ## How it differs from standard

          | Feature | Standard | Tactical |
          |---------|----------|----------|
          | Navigation | Type `go <dir>` | Click rooms on map or type commands |
          | Room info | `look` output | Visual map + tooltip hovers |
          | BREACH | Terminal output only | Dedicated slide-up panel with action buttons |
          | Vendor | Terminal `shop`/`buy`/`sell` | Slide-in panel with quantity selectors |
          | NPC | Terminal `talk`/`ask` | Slide-up panel with clickable topics |
          | Transit | Terminal commands | Slide-down panel with route display |
          | Status | `stat`, `inv`, `rep`, etc. | Always-visible tabbed sidebar |
          | Presence | Not visible | Real-time dots on map |

          Every command you can type in standard view still works in the
          Tactical terminal. The panels are visual shortcuts — they send
          the same commands under the hood.

      - slug: tactical-zone-map
        title: Zone Map & Navigation
        kind: reference
        position: 1
        published: true
        summary: "Isometric map — room rendering, click-to-navigate, fog of war, zoom, pan, and presence."
        metadata:
          search_tags:
            - map
            - isometric
            - navigation
            - fog of war
            - zoom
            - pan
            - ghost rooms
            - presence
        body: |
          # Zone Map & Navigation

          The Zone Map occupies the right side of the Tactical layout. It
          renders your current zone as an isometric (2.5D) tile grid.

          ## Room rendering

          Each room is a diamond-shaped isometric tile with colored side
          walls. Room type determines the color:

          - Hub rooms — amber
          - Faction bases — purple
          - Danger zones — red
          - Shops — orange
          - Den corridors — green
          - Standard rooms — muted gray

          Your current room has a bright border, full opacity, and a
          pulsing "you are here" marker.

          ## Fog of war

          You can only see rooms you've **visited** plus their immediate
          **adjacent** rooms (one hop out). Adjacent rooms you haven't
          visited appear as dark tiles with a `?` marker — their name,
          type, and contents are hidden until you visit.

          Once visited, a room stays visible permanently on the map.

          ## Click-to-navigate

          Click any **adjacent** room to move there — the system sends
          the appropriate `go <direction>` command. You can also click
          **ghost rooms** (cross-zone exits) to navigate into the next
          zone.

          Non-adjacent rooms are visible but not clickable.

          ## Ghost rooms

          Exits that lead to other zones appear as semi-transparent
          dashed tiles at the zone boundary, labeled with the
          destination zone name. Click to navigate through.

          **Vertical ghosts** (up/down exits to other z-levels) show as
          purple (up) or orange (down) indicators with arrows.

          ## Z-levels

          Zones can span multiple vertical levels. The map shows the
          current z-level at full opacity and fades other levels.
          Vertical connectors between levels are drawn as lines with
          colored arrows.

          ## Zoom & pan

          - **Scroll wheel** — zoom in/out (0.5× to 4×).
          - **Click and drag** — pan the viewport.

          ## Compass rose

          Navigation buttons in the bottom-left of the map provide
          compass-rose directional controls (8 directions + up/down).
          Buttons are enabled or disabled based on available exits from
          your current room.

          ## Hackr presence

          Other operatives in your zone appear as small dots on their
          current room tile, updated in real time via the ZoneChannel
          WebSocket. Hover to see aliases.

      - slug: tactical-panels
        title: Tactical Panels
        kind: reference
        position: 2
        published: true
        summary: "BREACH, Vendor, NPC, Transit, and Rest Pod panels — handles, interactions, and mutual exclusion."
        metadata:
          search_tags:
            - panels
            - breach panel
            - vendor panel
            - npc panel
            - transit panel
            - rest pod panel
            - tactical
        body: |
          # Tactical Panels

          Context-sensitive panels slide over the map when you're near
          specific room features. Each panel has a **handle** (a
          clickable tab on the map edge) and a **panel body** that
          slides in with a 300ms animation.

          Panels are **mutually exclusive** — opening one closes others.
          Active BREACH takes priority over everything.

          ## BREACH Panel

          **Handle**: BREACH target buttons appear in the top-right
          corner of the map when encounters are available.

          **Trigger**: click a target button and confirm, or type
          `breach <name>`.

          **Layout** (slides up, covers 85% of map):
          - **Header** — template name, tier (color-coded), round count,
            actions remaining.
          - **DECK snapshot** — name, battery bar (turns red below 25%).
          - **Action bar** — clickable software buttons (color-coded by
            category). Click a program, then click a protocol target to
            execute. ANALYZE and REROUTE are quick-action buttons that
            also prompt for a target.
          - **Breach output** — scrollable terminal showing the result of
            each action.
          - **JACKOUT** — button with confirmation modal showing vitals
            cost.

          Software buttons are disabled when battery is insufficient.
          All action buttons disable while a command is executing.

          ## Vendor Panel

          **Handle**: amber vertical tab on the right edge of the map.
          Visible when the room has a vendor mob.

          **Layout** (slides right, covers 50% of map):
          - **BUY section** — vendor listings with prices, stock,
            affordability indicator. Quantity selector (clamped by
            stock and balance). Confirm modal.
          - **SELL section** — your sellable inventory items with sell
            prices. Quantity selector. Confirm modal.

          Vendor avatar image (if set) displays above the listing.

          ## NPC Panel

          **Handle**: purple tab(s) on the bottom edge of the map, one
          per qualifying NPC (those with dialogue or quest_giver status).

          **Layout** (slides up, covers 50% of map):
          - **DIALOGUE tab** — greeting text, clickable topic buttons,
            breadcrumb path when deep in the tree, BACK/RESET navigation.
            Terminal output from dialogue is captured and displayed in the
            panel.
          - **MISSIONS tab** — active missions (with objective progress
            bars, TURN IN/ABANDON/DELIVER buttons) and available missions
            (with description, gates, ACCEPT button). Confirmation modals
            for all actions.

          Opening an NPC panel automatically fires `talk to <npc>` to
          trigger the greeting and any side effects (rep, achievements).

          NPC avatar image (if set) displays in a "wing" panel above.

          ## Transit Panel

          **Handle**: cyan horizontal tab centered on the top edge of
          the map. Visible when the room has transit routes or you have
          an active journey.

          **Layout** (slides down, covers 50% of map):
          - **LOCAL tab** — public routes with stop lists. BOARD buttons
            with direction choice (forward/reverse) at middle stops.
          - **PRIVATE tab** — destination picker with fare display. HAIL
            button.
          - **SLIPSTREAM tab** — boardable routes with leg counts,
            clearance requirements, and heat indicator (color-coded by
            tier: cold/warm/hot/burning).
          - **Active journey mode** — current stop, next stop, and
            action buttons (ADVANCE, WAIT, DISEMBARK, CHOOSE FORK,
            ABANDON).

          Panel auto-closes when a journey ends.

          ## Rest Pod Panel

          **Handle**: green tab on the right edge of the map (below
          vendor handle if both present). Visible in rest pod rooms.

          **Layout** (slides in from right):
          - Per-vital input controls (HP, EN, PS) showing current
            deficit.
          - FILL button per vital (max out that vital).
          - FILL ALL button.
          - Live cost preview based on point allocation.
          - RESTORE button sends the `rest` command.

      - slug: tactical-status-tabs
        title: Status Tabs
        kind: reference
        position: 3
        published: true
        summary: "DECK, STATS, GEAR, INV, REP, CRED, MISSIONS, SCHEM — what each tab shows and its interactive elements."
        metadata:
          search_tags:
            - tabs
            - deck tab
            - stats tab
            - gear tab
            - inventory tab
            - rep tab
            - cred tab
            - missions tab
            - schematics tab
            - tactical
        body: |
          # Status Tabs

          The Status Panel in the upper-left of the Tactical layout
          contains **8 tabs**. Each provides a live view of a game
          system, updated after every command.

          ## DECK

          Your equipped DECK with battery level, loaded software
          (names, categories, slot cost, battery cost), and installed
          modules with firmware status. If no DECK is equipped, shows
          an empty state.

          ## STATS

          Condensed operative dossier:
          - Alias and clearance level.
          - XP progress bar toward next clearance (or "MAX CLEARANCE").
          - Vitals (HP/EN/PS) with color-coded bars.
          - CRED summary (default cache balance, total across all
            caches). GovCorp debt warning if nonzero.
          - Equipped DECK snapshot (name, rarity, battery, slots).
          - Loadout summary (equipped/total slots).
          - Achievement count (earned/total) + in-progress list with
            mini progress bars.
          - Faction standings summary with tier badges.

          Cross-references to other tabs (CRED, DECK, GEAR, REP) are
          shown as muted hints.

          ## GEAR (Loadout)

          Visual slot grid showing all 13 equipment slots with equipped
          item names. DECK slot spans full width. Active effects from
          equipped gear listed below.

          ## INV (Inventory)

          Items grouped by type (gear, software, consumable, material,
          etc.) with rarity colors. Capacity progress bar
          (green/amber/red by fill percentage).

          Click an item for a detail modal showing name, rarity,
          description, properties, and available actions (USE, EQUIP,
          DROP, SALVAGE, SELL). Each action has a confirmation step.

          When a vendor is present, items show inline SELL buttons with
          the vendor's buy price.

          ## REP (Reputation)

          Faction standings matching the terminal `rep` output format —
          one line per faction with name, tier badge, ASCII bar, value,
          and next-tier hint. Parent→child hierarchy shown with
          indentation.

          ## CRED

          Cache management:
          - Total CRED balance across all caches.
          - GovCorp debt with garnishment warning (if any).
          - Per-cache display with DEFAULT and ABANDONED flags.
          - **+ NEW CACHE** button (creates via `cache create`).
          - **Rename** with modal input.
          - **Send** with transfer modal — amount, destination
            dropdown (your caches + custom address input).

          ## MISSIONS

          Active and completed missions. Active missions show objective
          progress, quest giver name and room. TURN IN button appears
          when all objectives are met.

          ## SCHEM (Schematics)

          Browsable schematic list with crafting status. Click a
          schematic for ingredient detail. FAB button with confirmation
          modal showing ingredient list and output item.

  - slug: tutorials
    name: Tutorials
    icon: ">"
    position: 7
