            - travel
            - beginner
        body: |
          # Your First Transit Ride

          Public transit routes run between fixed stops within a region.
          This walkthrough covers boarding, riding, and getting off.

          ## 1. Find a transit room

          Explore until `look` shows transit route information in the
          room description. Transit rooms display available routes with
          their stop lists. You can also type `transit` (or `tr`) to
          see what's available.

          ## 2. Check the route

          The route listing shows stop names in order. Find your
          destination in the list to confirm this route goes where you
          want.

          ## 3. Board

          ```
          board <route-name>
          ```

          If you're at the first or last stop, direction is automatic.
          At a middle stop, you can specify:

          ```
          board <route-name> forward
          board <route-name> reverse
          ```

          ## 4. Ride

          Type `wait` (or `w`) to advance to the next stop. Repeat for
          each stop along the route. Each stop moves you to a new room.

          ## 5. Disembark

          When you reach your destination:

          ```
          disembark
          ```

          You're now in the room corresponding to that stop. If you
          want to bail early, `abandon` cancels the journey entirely.

          ## Notes

          - Public transit has a fare deducted from your default cache on boarding.
          - Non-loop routes support bidirectional travel — you can ride
            forward or reverse.
          - For point-to-point travel, check if **private transit** is
            available: `hail <type> <destination>`.
          - For inter-region travel, see
            [Your First Slipstream Journey](/handbook/tutorial-first-slipstream).

      - slug: tutorial-first-slipstream
        title: Your First Slipstream Journey
        kind: tutorial
        difficulty: intermediate
        position: 3
        published: true
        summary: "Step-by-step: find a slipstream origin, manage heat, traverse legs, handle forks, and arrive in a new region."
        metadata:
          search_tags:
            - slipstream
            - tutorial
            - inter-region
            - travel
            - heat
        body: |
          # Your First Slipstream Journey

          Slipstream corridors are high-speed inter-region routes. They
          move you between geographic regions but come with risk —
          detection checks on each leg, heat accumulation, and possible
          mid-journey BREACH encounters.

          **Requires CL15+.**

          ## 1. Find a slipstream origin

          Slipstream origin rooms display route information when you
          `look`. Type `slipstream` (or `slip`) to see available routes
          with destinations, leg counts, and clearance requirements.

          ## 2. Check your heat

          Heat is a per-hackr value that persists between journeys and
          decays slowly over time. Higher heat means higher detection
          chance per leg. If you've been running slipstream routes
          recently, consider waiting for heat to decay.

          ## 3. Board

          ```
          slipstream <route-name>
          ```

          You're now in transit. The first leg begins.

          ## 4. Advance through legs

          ```
          advance
          ```

          Each leg runs a detection check. If you pass, you proceed to
          the next leg and accumulate heat. If detected:

          - **With a functional DECK**: a BREACH encounter starts
            mid-journey. Win to continue.
          - **Without a DECK**: vitals drain and the leg replays.

          ## 5. Handle forks

          Some legs present a **fork** — a choice between paths with
          different risk/speed tradeoffs. The terminal shows your
          options:

          ```
          choose stealth
          choose express
          ```

          Fork names are case-insensitive.

          ## 6. Arrive

          After the final leg, you arrive at the destination region's
          slipstream access room. From there, explore the new region
          normally.

          ## Tips

          - **Bring a charged DECK with loaded software** — if you hit
            a detection check, you'll need to fight a BREACH encounter.
            Without a DECK, you take vitals damage and retry the leg.
          - **Watch your heat** — repeated slipstream use without breaks
            compounds your detection risk. Let heat decay between trips.
          - **BREACH failure consequences scale with heat**: below 41
            heat is survivable (replay the leg), 41–70 is severe
            (vitals drain + lockout), 71+ is fatal (heavy drain +
            longer lockout). Vitals floor at 1 — you can't die in
            transit.
          - **Pack consumables** — stim packs and signal flares can help
            during mid-journey BREACH encounters.

          For the full mechanics, see the slipstream section of
          [Transit System](/handbook/transit-system).
