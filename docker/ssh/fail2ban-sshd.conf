# fail2ban jail for hackr.tv SSH terminal (port 9915)
#
# Bans IPs after repeated failed authentication attempts.
# Uses the built-in sshd filter which matches keyboard-interactive failures.
#
# With MaxAuthTries 3 in sshd_config, each connection allows 3 password
# attempts. maxretry=5 means a ban triggers after ~2 failed connections.

[sshd]
enabled  = true
port     = 9915
filter   = sshd[mode=aggressive]
logpath  = /var/log/sshd.log
maxretry = 5
findtime = 5m
bantime  = 10m
backend  = polling
